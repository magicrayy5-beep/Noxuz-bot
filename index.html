<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOXUZ BOT SYSTEM</title>
    <style>
        :root { --gold: #ffd700; --dark: #0a0a0a; --gray: #1a1a1a; --text: #e0e0e0; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        /* Layar Login */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .inp-login { width: 80%; padding: 12px; margin: 10px; background: var(--gray); border: 1px solid #333; color: white; border-radius: 8px; outline: none; }
        .btn-group { width: 85%; display: flex; gap: 10px; margin-top: 10px; }
        .btn-gold { flex: 1; padding: 12px; background: var(--gold); border: none; font-weight: bold; border-radius: 8px; cursor: pointer; color: black; }
        .btn-dark { flex: 1; padding: 12px; background: #333; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; color: white; }

        /* UI Chat */
        #chatBox { height: 85vh; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; }
        .bot-bubble { background: var(--gray); padding: 15px; border-radius: 12px; margin: 10px 0; border-left: 4px solid var(--gold); line-height: 1.5; align-self: flex-start; max-width: 85%; }
        .user-msg { align-self: flex-end; color: #888; font-size: 0.8rem; margin: 5px 0; }
        .menu-box { border: 1px dashed var(--gold); padding: 10px; margin-top: 10px; font-family: monospace; font-size: 0.85rem; background: rgba(255,215,0,0.02); }
        
        /* Input Area */
        .input-container { position: fixed; bottom: 0; width: 100%; display: flex; padding: 15px; background: #050505; box-sizing: border-box; border-top: 1px solid #222; }
        #chatInput { flex: 1; padding: 12px; background: var(--gray); border: 1px solid #333; color: white; border-radius: 8px; outline: none; }
        #sendBtn { background: var(--gold); border: none; padding: 0 20px; margin-left: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color:var(--gold); letter-spacing: 5px; margin-bottom: 5px;">NOXUZ</h1>
        <p style="color:#555; font-size: 0.7rem; margin-bottom: 20px;">V.2.0 DARK UNIVERSE</p>
        <input type="text" id="userInp" class="inp-login" placeholder="Username">
        <input type="password" id="passInp" class="inp-login" placeholder="Password">
        <div class="btn-group">
            <button class="btn-gold" onclick="handleLogin()">LOGIN</button>
            <button class="btn-dark" onclick="handleRegister()">DAFTAR</button>
        </div>
    </div>

    <div id="chatBox">
        <div class="bot-bubble"><b>System Online.</b><br>Selamat datang, silakan ketik <b>.menu</b> untuk bantuan.</div>
    </div>

    <div class="input-container">
        <input type="text" id="chatInput" placeholder="Ketik perintah Master...">
        <button id="sendBtn" onclick="sendMsg()">SEND</button>
    </div>

    <script src="script.js"></script>
</body>
  </html>
